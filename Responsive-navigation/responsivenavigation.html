<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; }
  nav { background: #333;
        color: #fff; 
        padding: 15px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        flex-wrap: wrap;}
  
  #toggle, .label-toggle { display: none; }
  
  .menu { 
        list-style: none; 
        display: flex; 
        gap: 20px; }

  .menu a { color: #fff; 
            text-decoration: none; }

  @media (max-width: 600px) {
    .label-toggle { display: block;
                    cursor: pointer; 
                    font-size: 1.5rem; }

    .menu { display: none; 
            width: 100%; 
            text-align: center; }
            
    .menu li { padding: 10px; }

    #toggle:checked ~ .menu { display: block; }
  }
</style>
</head>
<body>

<nav>
  <strong>MyLogo</strong>
  
  <input type="checkbox" id="toggle">
  <label for="toggle" class="label-toggle">&#9776;</label>

  <ul class="menu">
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>
<div style="padding: 20px;">
  <h1>Welcome</h1>
  <p>The desktop menu shows horizontally, and the mobile menu toggles perfectly.</p>
</div>

</body>
</html>
