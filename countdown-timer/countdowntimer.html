<!DOCTYPE html>
<html>
    <head>
        <title>COUNTDOWN TIMER</title>
<style>
    p {
        font-size: 50px;
        text-align: center;
    }
</style>
<body>
    <p id="demo"></p>
    <script>
        var countdowndate = new Date("25 April 2026,00:00:00").getTime();
        var x = setInterval(function() {
            var now = new Date().getTime();
            var distance = countdowndate - now;
            var days = Math.floor(distance/(1000*24*60*60));
            var hours = Math.floor(distance%(1000*24*60*60)/(1000*24*60));
            var mins = Math.floor(distance%(1000*24*60)/(1000*24));
            var sec = Math.floor(distance%(1000*24)/(1000));
            document.getElementById("demo").innerHTML = days + "d " + hours + "h " + mins +"m "+sec+"s ";
            if(distance<0){
                document.getElementById("demo").innerHTML="expired";
            }
        },1000);
    </script>
</body>
    </head>
</html>
